<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rodrigo Beleza | Portfólio{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        main { flex: 1; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-light">

    <style>
    /* Estilos personalizados para o toque de elegância */
    .navbar {
        transition: all 0.3s ease;
        /* Blur opcional para um efeito moderno de vidro */
        backdrop-filter: blur(10px);
        background-color: rgba(33, 37, 41, 0.95) !important; 
    }

    .navbar-brand {
        font-weight: 800 !important;
        letter-spacing: 3px; /* Espaçamento entre letras */
        text-transform: uppercase;
        font-size: 1.5rem;
    }

    .nav-link {
        font-weight: 500;
        margin: 0 10px;
        padding: 8px 20px !important;
        transition: all 0.3s ease;
        border-radius: 50px; /* Botões ovais */
    }

    /* Efeito ao passar o rato nos botões */
    .nav-link:hover {
        background-color: rgba(255, 255, 255, 0.1);
        color: #fff !important;
        transform: translateY(-2px);
    }

    .nav-link.active {
        background-color: #0d6efd; /* Cor principal do seu tema */
        color: white !important;
    }
</style>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow py-3">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">RODRIGO BELEZA</a>
        
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link active" href="{% url 'home' %}">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Projetos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Formação</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">TFCs</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Rodrigo Beleza. Construído com Django & Bootstrap.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
