{% extends 'portfolio/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 rounded-5 shadow-lg p-4 p-lg-5 bg-white">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0">Editar Percurso / Formação</h2>
                    <a href="{% url 'percurso' %}" class="btn btn-light rounded-pill px-4">Voltar</a>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted ms-2 mb-1">Designação</label>
                            <input type="text" name="designacao" value="{{ formacao.designacao }}" class="form-control rounded-pill p-3 bg-light border-0" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted ms-2 mb-1">Instituição</label>
                            <input type="text" name="instituicao" value="{{ formacao.instituicao }}" class="form-control rounded-pill p-3 bg-light border-0" required>
                        </div>

                        <div class="col-md-6">
                            <label class="small fw-bold text-muted ms-2 mb-1">Data Início</label>
                            <input type="date" name="data_inicio" value="{{ formacao.data_inicio|date:'Y-m-d' }}" class="form-control rounded-pill p-3 bg-light border-0" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted ms-2 mb-1">Data Fim (Opcional)</label>
                            <input type="date" name="data_fim" value="{{ formacao.data_fim|date:'Y-m-d' }}" class="form-control rounded-pill p-3 bg-light border-0">
                        </div>

                        <div class="col-12">
                            <label class="small fw-bold text-muted ms-2 mb-1">Descrição</label>
                            <textarea name="descricao" class="form-control rounded-4 p-3 bg-light border-0" rows="4">{{ formacao.descricao }}</textarea>
                        </div>

                        <div class="col-12">
                            <label class="small fw-bold text-muted ms-2 mb-1">Competências Adquiridas (Ctrl+Click para várias)</label>
                            <select name="competencias_adquiridas" class="form-select rounded-4 p-3 bg-light border-0" multiple size="4">
                                {% for comp in todas_competencias %}
                                    <option value="{{ comp.id }}" {% if comp in formacao.competencias_adquiridas.all %}selected{% endif %}>
                                        {{ comp.nome }} ({{ comp.nivel }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="mt-5 text-end">
                        <button type="submit" class="btn btn-primary rounded-pill px-5 py-3 shadow-sm fw-bold">Guardar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
