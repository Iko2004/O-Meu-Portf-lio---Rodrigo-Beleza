{% extends 'portfolio/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <div class="card border-0 rounded-5 shadow-lg p-4 p-lg-5 bg-white">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0">Editar Tecnologia</h2>
                    <a href="{% url 'tecnologias' %}" class="btn btn-light rounded-pill px-4">Voltar</a>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label small fw-bold text-muted ms-2">Nome da Tecnologia</label>
                            <input type="text" name="nome" value="{{ tecnologia.nome }}" class="form-control form-control-lg rounded-pill bg-light border-0" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted ms-2">Nível de Interesse</label>
                            <select name="nivel_interesse" class="form-select form-select-lg rounded-pill bg-light border-0">
                                <option value="1" {% if tecnologia.nivel_interesse == 1 %}selected{% endif %}>1</option>
                                <option value="2" {% if tecnologia.nivel_interesse == 2 %}selected{% endif %}>2</option>
                                <option value="3" {% if tecnologia.nivel_interesse == 3 %}selected{% endif %}>3</option>
                                <option value="4" {% if tecnologia.nivel_interesse == 4 %}selected{% endif %}>4</option>
                                <option value="5" {% if tecnologia.nivel_interesse == 5 %}selected{% endif %}>5</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted ms-2">Link Oficial</label>
                            <input type="url" name="link_oficial" value="{{ tecnologia.link_oficial|default:'' }}" class="form-control form-control-lg rounded-pill bg-light border-0" placeholder="https://...">
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted ms-2">Detalhes</label>
                            <textarea name="detalhes" class="form-control rounded-4 p-3 bg-light border-0" rows="4">{{ tecnologia.detalhes }}</textarea>
                        </div>

                        <div class="col-12 mt-4">
                            <label class="form-label small fw-bold text-muted ms-2">Logo (Deixa em branco para manter o atual)</label>
                            <input type="file" name="logo" class="form-control form-control-lg rounded-pill bg-light border-0" accept="image/*">
                        </div>

                        <div class="col-12 mt-5 text-end">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">Guardar Alterações</button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
