{% extends 'portfolio/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 rounded-5 shadow-lg p-5 bg-white text-center">
                <h2 class="fw-bold mb-5">Editar Competência</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="text-start">
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted ms-2">Nome</label>
                            <input type="text" name="nome" value="{{ competencia.nome }}" class="form-control rounded-pill p-3 bg-light border-0" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted ms-2">Categoria</label>
                            <input type="text" name="categoria" value="{{ competencia.categoria }}" class="form-control rounded-pill p-3 bg-light border-0">
                        </div>
                        <div class="mb-5">
                            <label class="form-label small fw-bold text-muted ms-2">Nível</label>
                            <select name="nivel" class="form-select rounded-pill p-3 bg-light border-0">
                                <option value="Iniciante" {% if competencia.nivel == 'Iniciante' %}selected{% endif %}>Iniciante</option>
                                <option value="Intermédio" {% if competencia.nivel == 'Intermédio' %}selected{% endif %}>Intermédio</option>
                                <option value="Avançado" {% if competencia.nivel == 'Avançado' %}selected{% endif %}>Avançado</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary rounded-pill px-5 py-3 w-100 shadow-sm fw-bold">Guardar Alterações</button>
                    <a href="{% url 'competencias' %}" class="btn btn-link text-muted mt-3 text-decoration-none">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
