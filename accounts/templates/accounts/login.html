{% extends 'portfolio/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-lock display-1 text-primary"></i>
                    <h2 class="fw-bold">Login</h2>
                    <p class="text-muted">Aceda à gestão do seu portfólio</p>
                </div>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger small py-2">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Username</label>
                        <input type="text" name="username" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control rounded-3" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm">Entrar</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="small text-muted">Não tem conta? <a href="{% url 'registo' %}" class="text-decoration-none">Registe-se aqui</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
